<div id="main-menu" class="main-menu">
  <ul>
    {{ $currentPage := . }}
    {{ range .Site.Menus.main }}
    <li class="menu-item-{{ .Name | lower }}{{ if or ($currentPage.IsMenuCurrent "main" .) (eq $currentPage.RelPermalink .URL) }} active{{ end }}">
      <a href="{{.URL}}">
        {{ .Pre }}
        <span>{{ .Name }}</span>
      </a>
    </li>
    {{end}}
    <li class="menu-item-lang">
      <button id="lang-toggle" data-current-lang="en" style="background:none;border:1px solid currentColor;color:inherit;cursor:pointer;font-family:'Inter',sans-serif;font-size:0.85rem;font-weight:600;letter-spacing:0.05em;padding:0.25rem 0.6rem;border-radius:3px;line-height:1;">ES</button>
    </li>
  </ul>
</div>
