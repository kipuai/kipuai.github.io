<div id="main-menu-mobile" class="main-menu-mobile">
  <ul>
    {{ $currentPage := . }}
    {{ range .Site.Menus.main }}
    <li class="menu-item-{{ .Name | lower }}{{ if $currentPage.IsMenuCurrent "main" . }} active{{ end }}">
      <a href="{{.URL}}">
        {{ .Pre }}
        <span>{{ .Name }}</span>
      </a>
    </li>
    {{end}}
    <li class="menu-item-lang" style="padding:0.5rem 0;">
      <button id="lang-toggle-mobile" data-current-lang="en" style="background:none;border:1px solid #2A2D34;color:#2A2D34;cursor:pointer;font-family:'Inter',sans-serif;font-size:0.85rem;font-weight:600;letter-spacing:0.05em;padding:0.25rem 0.6rem;border-radius:3px;line-height:1;">ES</button>
    </li>
  </ul>
</div>
